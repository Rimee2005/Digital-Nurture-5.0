<section class="home-container">

  <!-- Interpolation: Component data → Template -->
  <h1>{{ portalName }}</h1>

  <p>
    Manage your courses, track your enrollment, and view your academic progress
    from one place.
  </p>

  <!-- Property Binding -->
  <button
    [disabled]="!isPortalActive"
    (click)="onEnrollClick()">
    Enroll Now
  </button>

  <!-- Event Binding result -->
  <p *ngIf="message">
    {{ message }}
  </p>

  <hr>

  <!-- Two-way Data Binding -->
  <input
    type="text"
    placeholder="Search courses"
    [(ngModel)]="searchTerm">

  <p>Searching for: {{ searchTerm }}</p>

  <!--
    [property] = One-way binding: Component → DOM

    [(ngModel)] = Two-way binding: DOM ↔ Component
    It updates the component property when the user types
    and updates the input when the component property changes.
  -->

  <div class="stats-row">

    <div class="stat-card">
      <h3>Courses Available</h3>
      <p>12</p>
    </div>

    <div class="stat-card">
      <h3>Enrolled</h3>
      <p>3</p>
    </div>

    <div class="stat-card">
      <h3>GPA</h3>
      <p>3.8</p>
    </div>

  </div>

</section>
