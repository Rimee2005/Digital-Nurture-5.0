<h1>Available Courses</h1>

<p *ngIf="isLoading">
  Loading courses...
</p>

<div *ngIf="!isLoading">

  <app-course-card
    *ngFor="let course of courses; trackBy: trackByCourseId"
    [course]="course"
    (enrollRequested)="onEnroll($event)">
  </app-course-card>

</div>

<p *ngIf="selectedCourseId">
  Selected course ID: {{ selectedCourseId }}
</p>
