<div class="form-container">

  <h1>
    Reactive Enrollment Form
  </h1>


  <form
    [formGroup]="enrollForm"

    (ngSubmit)="onSubmit()"
  >


    <!-- STUDENT NAME -->

    <div class="form-group">

      <label>
        Student Name
      </label>


      <input

        type="text"

        formControlName="studentName"

      />


      <span

        class="error"

        *ngIf="

          enrollForm.get('studentName')?.touched &&

          enrollForm.get('studentName')?.errors?.['required']

        "

      >

        Name is required

      </span>


      <span

        class="error"

        *ngIf="

          enrollForm.get('studentName')?.touched &&

          enrollForm.get('studentName')?.errors?.['minlength']

        "

      >

        Name must be at least 3 characters

      </span>

    </div>


    <!-- STUDENT EMAIL -->

    <div class="form-group">

      <label>
        Student Email
      </label>


      <input

        type="email"

        formControlName="studentEmail"

      />


      <span

        class="error"

        *ngIf="

          enrollForm.get('studentEmail')?.touched &&

          enrollForm.get('studentEmail')?.errors?.['required']

        "

      >

        Email is required

      </span>


      <span

        class="error"

        *ngIf="

          enrollForm.get('studentEmail')?.touched &&

          enrollForm.get('studentEmail')?.errors?.['email']

        "

      >

        Please enter a valid email

      </span>


      <span

        class="error"

        *ngIf="

          enrollForm.get('studentEmail')?.errors?.['emailTaken']

        "

      >

        Email is already taken

      </span>

    </div>


    <!-- COURSE ID -->

    <div class="form-group">

      <label>
        Course ID
      </label>


      <input

        type="text"

        formControlName="courseId"

      />


      <span

        class="error"

        *ngIf="

          enrollForm.get('courseId')?.touched &&

          enrollForm.get('courseId')?.errors?.['required']

        "

      >

        Course ID is required

      </span>


      <span

        class="error"

        *ngIf="

          enrollForm.get('courseId')?.errors?.['noCourseCode']

        "

      >

        Course code starting with XX is not allowed.

      </span>

    </div>


    <!-- PREFERRED SEMESTER -->

    <div class="form-group">

      <label>
        Preferred Semester
      </label>


      <select

        formControlName="preferredSemester"

      >

        <option value="Odd">
          Odd
        </option>


        <option value="Even">
          Even
        </option>

      </select>

    </div>


    <!-- ADDITIONAL COURSES -->

    <div class="additional-courses">

      <h3>
        Additional Courses
      </h3>


      <div

        *ngFor="

          let ctrl of additionalCourses.controls;

          let i = index

        "

        class="course-row"

      >


        <input

          [formControl]="ctrl"

          placeholder="Enter additional course"

        />


        <button

          type="button"

          (click)="removeCourse(i)"

        >

          Remove

        </button>


        <span

          class="error"

          *ngIf="ctrl.touched && ctrl.invalid"

        >

          Course is required

        </span>

      </div>


      <button

        type="button"

        (click)="addCourse()"

      >

        Add Another Course

      </button>

    </div>


    <!-- TERMS -->

    <div class="terms">

      <input

        type="checkbox"

        formControlName="agreeToTerms"

      />


      <label>
        I agree to the terms and conditions
      </label>

    </div>


    <span

      class="error"

      *ngIf="

        enrollForm.get('agreeToTerms')?.touched &&

        enrollForm.get('agreeToTerms')?.invalid

      "

    >

      You must agree to the terms

    </span>


    <!-- BUTTON -->

    <button

      type="submit"

      [disabled]="enrollForm.invalid"

    >

      Submit

    </button>


  </form>

</div>
