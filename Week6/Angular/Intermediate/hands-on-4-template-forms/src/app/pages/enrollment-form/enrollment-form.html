<div class="form-container">

  <h1>Student Enrollment Request</h1>

  <form
    #enrollForm="ngForm"
    (ngSubmit)="onSubmit(enrollForm)"
  >

    <!-- STUDENT NAME -->

    <div class="form-group">

      <label for="studentName">
        Student Name
      </label>

      <input
        type="text"
        id="studentName"
        name="studentName"

        [(ngModel)]="studentName"

        required
        minlength="3"

        #nameCtrl="ngModel"
      >

      <!-- Required Error -->

      <span
        class="error"
        *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']"
      >
        Name is required
      </span>

      <!-- Minimum Length Error -->

      <span
        class="error"
        *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']"
      >
        Name must be at least 3 characters
      </span>

    </div>


    <!-- STUDENT EMAIL -->

    <div class="form-group">

      <label for="studentEmail">
        Student Email
      </label>

      <input
        type="email"
        id="studentEmail"
        name="studentEmail"

        [(ngModel)]="studentEmail"

        required
        email

        #emailCtrl="ngModel"
      >

      <span
        class="error"
        *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']"
      >
        Email is required
      </span>

      <span
        class="error"
        *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']"
      >
        Please enter a valid email
      </span>

    </div>


    <!-- COURSE ID -->

    <div class="form-group">

      <label for="courseId">
        Course ID
      </label>

      <input
        type="number"
        id="courseId"
        name="courseId"

        [(ngModel)]="courseId"

        required

        #courseCtrl="ngModel"
      >

      <span
        class="error"
        *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']"
      >
        Course ID is required
      </span>

    </div>


    <!-- PREFERRED SEMESTER -->

    <div class="form-group">

      <label for="preferredSemester">
        Preferred Semester
      </label>

      <select
        id="preferredSemester"
        name="preferredSemester"

        [(ngModel)]="preferredSemester"

        required

        #semesterCtrl="ngModel"
      >

        <option value="">
          Select Semester
        </option>

        <option value="Odd">
          Odd
        </option>

        <option value="Even">
          Even
        </option>

      </select>

      <span
        class="error"
        *ngIf="semesterCtrl.touched && semesterCtrl.errors?.['required']"
      >
        Please select a semester
      </span>

    </div>


    <!-- TERMS AND CONDITIONS -->

    <div class="checkbox-group">

      <input
        type="checkbox"
        id="agreeToTerms"
        name="agreeToTerms"

        [(ngModel)]="agreeToTerms"

        required

        #termsCtrl="ngModel"
      >

      <label for="agreeToTerms">
        I agree to the terms and conditions
      </label>

    </div>

    <span
      class="error"
      *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']"
    >
      You must agree to the terms
    </span>


    <!-- BUTTONS -->

    <div class="buttons">

      <button
        type="submit"

        [disabled]="enrollForm.invalid"
      >
        Submit
      </button>


      <button
        type="button"

        (click)="resetForm(enrollForm)"
      >
        Reset
      </button>

    </div>


    <!-- SUCCESS MESSAGE -->

    <div
      class="success-message"

      *ngIf="submitted"
    >
      Enrollment request submitted successfully!
    </div>

  </form>

</div>
